<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全能录制工具（带试听）</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; padding: 40px; background: #f0f2f5; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        h1 { margin-bottom: 25px; color: #333; font-size: 22px; }
        button { width: 100%; border: none; padding: 15px; border-radius: 8px; font-size: 18px; cursor: pointer; margin-bottom: 15px; font-weight: bold; color: white; transition: opacity 0.2s; }
        button:active { opacity: 0.8; }
        .btn-audio { background: #ff4b4b; } /* 红色 */
        .btn-video { background: #007aff; } /* 蓝色 */
        .btn-stop { background: #333; display: none; } /* 停止按钮默认隐藏 */
        .preview-box { margin-top: 20px; text-align: left; }
        audio, video { width: 100%; margin-top: 10px; border-radius: 8px; background: #000; }
        .status { margin-top: 10px; font-size: 14px; color: #666; height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>🎙️ 录制与试听工具箱</h1>

        <!-- 录音部分 -->
        <button class="btn-audio" onclick="startAudio()">开始录音</button>
        <div class="preview-box" id="audioSection" style="display:none;">
            <p style="margin:0; font-size:14px; font-weight:bold;">🎧 录音回放：</p>
            <audio id="audioPlayer" controls></audio>
        </div>

        <hr style="border:0; border-top:1px solid #eee; margin: 30px 0;">

        <!-- 录屏部分 -->
        <button class="btn-video" onclick="startVideo()">开始录屏</button>
        <div class="preview-box" id="videoSection" style="display:none;">
            <p style="margin:0; font-size:14px; font-weight:bold;">📺 录屏回放：</p>
            <video id="videoPlayer" controls></video>
        </div>

        <!-- 全局停止按钮（可选，也可以分别控制，这里为了简单演示分别控制） -->
        <div class="status" id="statusText">等待操作...</div>
    </div>
</div>

<script>
    // === 录音逻辑 ===
    let audioRecorder;
    let audioChunks = [];

    async function startAudio() {
        const status = document.getElementById('statusText');
        try {
            status.innerText = "正在录音... (请点击停止)";
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            audioRecorder = new MediaRecorder(stream);
            audioChunks = [];

            audioRecorder.ondataavailable = event => {
                audioChunks.push(event.data);
            };

            audioRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                const audioUrl = URL.createObjectURL(audioBlob);
                const audio = document.getElementById('audioPlayer');
                audio.src = audioUrl; // 关键：将录音数据赋值给播放器
                
                document.getElementById('audioSection').style.display = 'block';
                status.innerText = "录音结束，请点击下方播放";
            };

            audioRecorder.start();
            
            // 修改按钮状态
            const btn = document.querySelector('.btn-audio');
            btn.innerText = "⏹️ 停止录音";
            btn.onclick = stopAudio;

        } catch (err) {
            console.error(err);
            status.innerText = "录音失败: " + err.message;
            alert("录音权限被拒绝或不支持");
        }
    }

    function stopAudio() {
        if (audioRecorder) {
            audioRecorder.stop();
            // 停止所有音轨以关闭麦克风指示灯
            audioRecorder.stream.getTracks().forEach(track => track.stop());
            
            const btn = document.querySelector('.btn-audio');
            btn.innerText = "开始录音";
            btn.onclick = startAudio;
        }
    }

    // === 录屏逻辑 ===
    let videoRecorder;
    let videoChunks = [];

    async function startVideo() {
        const status = document.getElementById('statusText');
        try {
            status.innerText = "正在录屏... (请选择窗口)";
            // 开启系统音频录制 (chrome/edge支持)
            const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
            
            videoRecorder = new MediaRecorder(stream);
            videoChunks = [];

            videoRecorder.ondataavailable = event => {
                videoChunks.push(event.data);
            };

            videoRecorder.onstop = () => {
                const videoBlob = new Blob(videoChunks, { type: 'video/webm' });
                const videoUrl = URL.createObjectURL(videoBlob);
                const video = document.getElementById('videoPlayer');
                video.src = videoUrl; // 关键：将视频数据赋值给播放器
                
                document.getElementById('videoSection').style.display = 'block';
                status.innerText = "录屏结束，请点击下方播放";
            };

            // 当用户点击“停止共享”时触发
            stream.getVideoTracks()[0].onended = () => {
                stopVideo();
            };

            videoRecorder.start();
            
            const btn = document.querySelector('.btn-video');
            btn.innerText = "⏹️ 停止录屏";
            btn.onclick = stopVideo;
            status.innerText = "录屏中...";

        } catch (err) {
            console.error(err);
            status.innerText = "录屏失败: " + err.message;
        }
    }

    function stopVideo() {
        if (videoRecorder) {
            videoRecorder.stop();
            // 停止共享屏幕
            videoRecorder.stream.getTracks().forEach(track => track.stop());
            
            const btn = document.querySelector('.btn-video');
            btn.innerText = "开始录屏";
            btn.onclick = startVideo;
            document.getElementById('statusText').innerText = "录屏已停止";
        }
    }
</script>

</body>
</html>
